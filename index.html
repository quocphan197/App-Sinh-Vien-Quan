<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sinh Viên Quán - Splash Screen</title>
    <meta name="description" content="Sinh Viên Quán — Ăn nhanh cho kịp tiết, ăn no cho kịp deadline.">
    <meta name="theme-color" content="#a53c00">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/favicon.svg">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Be+Vietnam+Pro:wght@400;700;800&family=Inter:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="css/splash.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "custom-orange": "#fa7525",
                        "surface-container-low": "#fff1ec",
                        "surface": "#fff8f6",
                        "status-brown": "#78350F",
                        "primary-fixed-dim": "#ffb598",
                        "surface-variant": "#f6ddd5",
                        "primary": "#a53c00",
                        "primary-container": "#f46b2a",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#541b00",
                        "on-surface": "#251914",
                        "status-red": "#E11D48",
                        "status-green": "#10B981",
                        "dark-black": "#1E1E1E",
                        "inverse-surface": "#3c2d28"
                    },
                    spacing: {
                        "margin-mobile": "1rem",
                        "stack-md": "1rem",
                        "stack-lg": "1.5rem",
                        "stack-sm": "0.5rem"
                    },
                    fontFamily: {
                        "hero-mobile": ["Anton", "sans-serif"],
                        "body-lg": ["Be Vietnam Pro", "sans-serif"],
                        "section-title-mobile": ["Be Vietnam Pro", "sans-serif"],
                        "body-md": ["Be Vietnam Pro", "sans-serif"]
                    },
                    fontSize: {
                        "hero-mobile": ["40px", { lineHeight: "44px", fontWeight: "400" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "section-title-mobile": ["24px", { lineHeight: "32px", fontWeight: "800" }],
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }]
                    }
                }
            }
        };
    </script>
</head>
<body class="splash-page bg-gray-100 text-on-surface min-h-screen flex items-center justify-center transition-colors duration-300">

    <!-- Phone frame (same shell as app.html) -->
    <div id="splash-phone" class="relative max-w-md w-full min-h-screen md:min-h-[850px] md:max-h-[900px] md:rounded-[40px] md:shadow-[0_25px_60px_-15px_rgba(165,60,0,0.25)] overflow-hidden flex flex-col md:border-8 md:border-dark-black bg-[#f77b27]">

        <!-- Status bar mock (desktop frame) -->
        <div class="hidden md:flex justify-between items-center px-6 py-2 bg-[#f77b27]/90 text-white/80 font-label-sm text-[11px] select-none border-b border-white/10 shrink-0 relative z-30">
            <span class="font-semibold" id="mock-time">12:00</span>
            <div class="flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[12px] font-bold">signal_cellular_4_bar</span>
                <span class="material-symbols-outlined text-[12px] font-bold">wifi</span>
                <span class="material-symbols-outlined text-[14px]">battery_5_bar</span>
            </div>
        </div>

        <!-- Splash stage: all content clipped inside phone -->
        <div id="splash-stage" class="relative flex-1 flex flex-col overflow-hidden min-h-0 bg-[#f77b27]">

            <!-- Decorative blobs (inside frame) -->
            <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none" aria-hidden="true">
                <div class="absolute top-[-5%] right-[-15%] w-[220px] h-[220px] bg-primary rounded-full blur-[60px] opacity-40"></div>
                <div class="absolute bottom-[-5%] left-[-15%] w-[180px] h-[180px] bg-on-primary-container rounded-full blur-[50px] opacity-30"></div>
            </div>

            <!-- Splash brand -->
            <div class="relative z-10 flex flex-1 flex-col items-center justify-center text-center px-margin-mobile" id="splash-container">
                <div class="mb-4 opacity-20 animate-float pointer-events-none">
                    <span class="material-symbols-outlined text-[88px] text-white leading-none">restaurant</span>
                </div>

                <h1 class="font-hero-mobile text-hero-mobile text-white mb-stack-sm tracking-wide splash-reveal splash-title-shadow">
                    Sinh Viên Quán
                </h1>

                <p class="font-body-lg text-body-lg text-white opacity-90 max-w-[280px] splash-reveal">
                    Ăn nhanh cho kịp tiết, ăn no cho kịp deadline.
                </p>

                <div class="mt-stack-lg flex gap-2 splash-reveal splash-dots-delay">
                    <div class="w-2 h-2 rounded-full bg-white/40 animate-bounce"></div>
                    <div class="w-2 h-2 rounded-full bg-white/70 animate-bounce splash-dot-2"></div>
                    <div class="w-2 h-2 rounded-full bg-white animate-bounce splash-dot-3"></div>
                </div>
            </div>

            <!-- Onboarding (absolute inside phone, slides up) -->
            <div class="absolute inset-0 z-20 flex flex-col p-margin-mobile bg-[#f77b27] overflow-hidden" id="onboarding-layer">

                <div class="flex-1 flex items-center justify-center min-h-0 py-2">
                    <div class="relative w-full max-w-[260px] max-h-[42vh] aspect-square">
                        <img
                            class="w-full h-full object-contain drop-shadow-lg"
                            alt="Logo Sinh Viên Quán"
                            src="https://i.ibb.co/qF7nYZsg/ideogram-v3-0-typography-logo-design-By-Anon-modern-playful-font-slightly-quirky-letterforms-s-0.png"
                            width="260"
                            height="260"
                            loading="eager"
                        >
                    </div>
                </div>

                <div class="text-center mb-stack-md shrink-0">
                    <h2 class="font-section-title-mobile text-section-title-mobile text-white mb-stack-sm">
                        Nạp Năng Lượng Tức Thì
                    </h2>
                    <p class="font-body-md text-body-md text-white/90 px-2">
                        Chọn món trong 3 giây, nhận cơm sau 2 phút. Sinh Viên Quán hiểu cái bụng đói của bạn!
                    </p>
                </div>

                <div class="space-y-3 pb-safe shrink-0 w-full">
                    <button type="button" id="btn-start" class="w-full h-[52px] bg-white font-section-title-mobile text-[17px] rounded-xl shadow-md active:scale-95 transition-transform text-[#f77b27] font-extrabold">
                        Bắt đầu ngay
                    </button>
                    <button type="button" id="btn-login" class="w-full h-[52px] border border-white/40 text-white font-section-title-mobile text-[17px] rounded-xl active:opacity-70 transition-opacity font-bold">
                        Đăng nhập
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/splash.js"></script>
    <script>
        function updateMockClock() {
            const el = document.getElementById('mock-time');
            if (!el) return;
            const now = new Date();
            el.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateMockClock, 1000);
        updateMockClock();
    </script>
</body>
</html>
