name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript syntax
        run: npm run validate

      - name: Verify static assets exist
        run: |
          test -f index.html
          test -f app.html
          test -f css/app.css
          test -f css/splash.css
          test -f js/app.js
          test -f js/splash.js
          test -f vercel.json
